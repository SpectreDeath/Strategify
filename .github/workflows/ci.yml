name: Strategify CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install security scan dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit safety
      - name: Run Bandit security scan
        run: |
          bandit -r strategify/ -f json -o bandit-report.json || true
          cat bandit-report.json
      - name: pip-audit dependency scan
        run: |
          pip-audit --python-executable $(which python)
      - name: Safety check
        run: |
          safety check --json || true

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format . --check
      - name: Mypy type check (ignore TOML errors)
        run: uv run mypy . --config-file pyproject.toml --ignore-missing-imports || true

  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: Run tests with coverage
        run: |
          uv run pytest --cov=strategify --cov=src --cov-fail-under=70 --cov-report=term-missing --cov-report=xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, code-quality]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv
      - name: Build package
        run: uv build
      - name: Verify deterministic build
        run: |
          uv build --no-sources -d dist/empty
          uv build --no-sources -d dist/full
          diff <(find dist/empty -type f -exec echo {} \; | sort) <(find dist/full -type f -exec echo {} \; | sort) || (echo "Build outputs differ!" && exit 1)
